<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Merged Hex Continent</title>
<style>
  body { margin: 0; overflow: hidden; background: black; }
</style>
</head>
<body>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
  }
}
</script>

<script type="module">

import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";
import GUI from "https://cdn.jsdelivr.net/npm/lil-gui@0.18/+esm";

const PLANET_RADIUS = 2;
const HEX_SIZE = 0.18;
const GRID_RADIUS = 18;

// Scene
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.01, 100);
camera.position.set(4,3,4);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff, 0.4));
const sun = new THREE.DirectionalLight(0xffffff, 1.2);
sun.position.set(5,3,5);
scene.add(sun);

const controls = new OrbitControls(camera, renderer.domElement);

// Biome Colors
const BIOMES = {
  desert: new THREE.Color(0xc2b280),
  tundra: new THREE.Color(0xd8e3f0),
  grassland: new THREE.Color(0x4caf50),
  mountain: new THREE.Color(0x888888)
};

// ----------------------------
// Continent Seed (single continent)
// ----------------------------

const continentNormal = new THREE.Vector3(0.2, 0.8, 0.4).normalize();
const continentAngle = Math.acos(1/3); // ~1/3 sphere

function isInContinent(direction) {
  return direction.angleTo(continentNormal) < continentAngle;
}

function getBiome(direction, isBoundary) {

  if (isBoundary) return "mountain";

  const lat = direction.y;

  if (lat > 0.6) return "tundra";
  if (lat < -0.4) return "desert";

  const noise = Math.sin(direction.x * 8) * Math.sin(direction.z * 8);

  if (noise > 0.6) return "mountain";

  return "grassland";
}

// ----------------------------
// Merged Continent Geometry
// ----------------------------

function buildContinent() {

  const vertices = [];
  const indices = [];
  const colors = [];

  let indexOffset = 0;

  const centerNormal = continentNormal;

  const tangent = new THREE.Vector3()
    .crossVectors(centerNormal, new THREE.Vector3(1,0,0))
    .normalize();

  const bitangent = new THREE.Vector3()
    .crossVectors(centerNormal, tangent)
    .normalize();

  for (let q = -GRID_RADIUS; q <= GRID_RADIUS; q++) {
    for (let r = -GRID_RADIUS; r <= GRID_RADIUS; r++) {

      if (Math.abs(q + r) > GRID_RADIUS) continue;

      const x2D = HEX_SIZE * (1.5 * q);
      const y2D = HEX_SIZE * (Math.sqrt(3)/2 * q + Math.sqrt(3) * r);

      const flatPoint = new THREE.Vector3()
        .addScaledVector(tangent, x2D)
        .addScaledVector(bitangent, y2D)
        .addScaledVector(centerNormal, PLANET_RADIUS);

      const direction = flatPoint.clone().normalize();

      if (!isInContinent(direction)) continue;

      const surfaceCenter = direction.clone().multiplyScalar(PLANET_RADIUS);

      const boundary = direction.angleTo(continentNormal) > continentAngle - 0.1;

      const biomeName = getBiome(direction, boundary);
      const color = BIOMES[biomeName];

      // build wedge
      const normal = direction.clone();

      const t = new THREE.Vector3()
        .crossVectors(
          normal,
          Math.abs(normal.y) < 0.9
            ? new THREE.Vector3(0,1,0)
            : new THREE.Vector3(1,0,0)
        ).normalize();

      const b = new THREE.Vector3().crossVectors(normal, t);

      const ring = [];

      for (let i = 0; i < 6; i++) {
        const angle = (i / 6) * Math.PI * 2;

        const offset =
          t.clone().multiplyScalar(Math.cos(angle) * HEX_SIZE)
          .add(b.clone().multiplyScalar(Math.sin(angle) * HEX_SIZE));

        const corner = surfaceCenter.clone()
          .add(offset)
          .normalize()
          .multiplyScalar(PLANET_RADIUS);

        ring.push(corner);
      }

      const apex = new THREE.Vector3(0,0,0);

      // add vertices
      ring.forEach(v => {
        vertices.push(v.x, v.y, v.z);
        colors.push(color.r, color.g, color.b);
      });

      vertices.push(apex.x, apex.y, apex.z);
      colors.push(color.r, color.g, color.b);

      const apexIndex = indexOffset + 6;

      // top face
      for (let i = 1; i < 5; i++) {
        indices.push(indexOffset, indexOffset+i, indexOffset+i+1);
      }

      // sides
      for (let i = 0; i < 6; i++) {
        const next = (i+1) % 6;
        indices.push(indexOffset+i, indexOffset+next, apexIndex);
      }

      indexOffset += 7;
    }
  }

  const geometry = new THREE.BufferGeometry();
  geometry.setAttribute("position", new THREE.Float32BufferAttribute(vertices,3));
  geometry.setAttribute("color", new THREE.Float32BufferAttribute(colors,3));
  geometry.setIndex(indices);
  geometry.computeVertexNormals();

  const material = new THREE.MeshStandardMaterial({
    vertexColors: true,
    flatShading: true,
    roughness: 0.9
  });

  return new THREE.Mesh(geometry, material);
}

const continentMesh = buildContinent();
scene.add(continentMesh);

// ----------------------------
// GUI
// ----------------------------

const gui = new GUI();
const settings = { rotate: true };
gui.add(settings, "rotate").name("Rotate");

function animate() {
  requestAnimationFrame(animate);
  if (settings.rotate) continentMesh.rotation.y += 0.002;
  renderer.render(scene, camera);
}

animate();

</script>
</body>
</html>
