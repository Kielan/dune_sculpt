<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Hex BMesh Tooling</title>
<style>
  body { margin: 0; overflow: hidden; background: #111; }
</style>
</head>
<body>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
  }
}
</script>

<script type="module">

import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";
import { TransformControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/TransformControls.js";
import GUI from "https://cdn.jsdelivr.net/npm/lil-gui@0.18/+esm";

class Arena {
  constructor() { this.items = []; }
  add(item) { item.id = this.items.length; this.items.push(item); return item; }
  get(id) { return this.items[id]; }
  forEach(cb) { this.items.forEach(cb); }
}
class MVert {
  constructor(position) { this.position = position.clone(); }
}
class MEdge {
  constructor(v1, v2) { this.v1 = v1; this.v2 = v2; }
}
class MFace {
  constructor(verts) { this.verts = verts; }
}
class Mesh {
  constructor() {
    this.verts = new Arena();
    this.edges = new Arena();
    this.faces = new Arena();
  }
  addVert(pos) { return this.verts.add(new MVert(pos)); }
  addEdge(v1, v2) { return this.edges.add(new MEdge(v1, v2)); }
  addFace(verts) { return this.faces.add(new MFace(verts)); }
}
//TODO add a 2nd hexagon loop 1 unit V_Axis above the current hexagon.
function buildGeometry() {
  const mesh = new Mesh();
  const radius = 1;
  const verts = [];
  for (let i = 0; i < 6; i++) {
    const angle = (i / 6) * Math.PI * 2;
    const v = mesh.addVert(
      new THREE.Vector3(
        Math.cos(angle) * radius,
        0,
        Math.sin(angle) * radius
      )
    );
    verts.push(v);
  }
  for (let i = 0; i < 6; i++) {
    mesh.addEdge(verts[i], verts[(i+1)%6]);
  }
  mesh.addFace(verts);
  return mesh;
}
function meshToThree(mesh) {
  const vertices = [];
  const indices = [];
  mesh.verts.forEach(v => {
    vertices.push(v.position.x, v.position.y, v.position.z);
  });
  const face = mesh.faces.get(0);
  for (let i = 1; i < face.verts.length - 1; i++) {
    indices.push(
      face.verts[0].id,
      face.verts[i].id,
      face.verts[i+1].id
    );
  }
  const geometry = new THREE.BufferGeometry();
  geometry.setAttribute(
    "position",
    new THREE.Float32BufferAttribute(vertices, 3)
  );
  geometry.setIndex(indices);
  geometry.computeVertexNormals();
  return geometry;
}
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.01, 100);
camera.position.set(3,2,3);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);
scene.add(new THREE.AmbientLight(0xffffff, 0.5));
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(5,5,5);
scene.add(light);
const controls = new OrbitControls(camera, renderer.domElement);
const ToolMode = {
  SELECT: "SELECT",
  MOVE_VERTEX: "MOVE_VERTEX"
};
let currentTool = ToolMode.SELECT;
const mesh = buildGeometry();
const geometry = meshToThree(mesh);
const material = new THREE.MeshStandardMaterial({
  color: 0x4caf50,
  side: THREE.DoubleSide
});
const hexMesh = new THREE.Mesh(geometry, material);
scene.add(hexMesh);
const handleMaterial = new THREE.MeshStandardMaterial({ color: 0xff0000 });
const vertexHandles = [];
mesh.verts.forEach((v) => {
  const sphere = new THREE.Mesh(
    new THREE.SphereGeometry(0.07, 16, 16),
    handleMaterial.clone()
  );
  sphere.position.copy(v.position);
  sphere.userData.vert = v;
  scene.add(sphere);
  vertexHandles.push(sphere);
});
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let hoveredHandle = null;
let selectedHandle = null;
function clearHover() {
  if (!hoveredHandle) return;
  hoveredHandle.material.color.set(0xff0000);
  hoveredHandle = null;
  document.body.style.cursor = "default";
}
window.addEventListener("pointermove", (event) => {
  if (currentTool !== ToolMode.SELECT) return;
  if (transform.dragging) return;
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(vertexHandles);
  if (intersects.length > 0) {
    const handle = intersects[0].object;
    if (hoveredHandle !== handle) {
      clearHover();
      hoveredHandle = handle;
      hoveredHandle.material.color.set(0xffff00);
      document.body.style.cursor = "pointer";
    }
  } else {
    clearHover();
  }
});
window.addEventListener("pointerdown", (event) => {
  if (currentTool !== ToolMode.SELECT) return;
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(vertexHandles);
  if (intersects.length > 0) {
    selectVertex(intersects[0].object);
  }
});
const transform = new TransformControls(camera, renderer.domElement);
scene.add(transform);
transform.addEventListener("dragging-changed", (event) => {
  controls.enabled = !event.value;
});
transform.addEventListener("objectChange", () => {
  if (!selectedHandle) return;
  const vert = selectedHandle.userData.vert;
  vert.position.copy(selectedHandle.position);
  updateGeometry();
});
transform.addEventListener("mouseUp", () => {
  currentTool = ToolMode.SELECT;
});
function selectVertex(handle) {
  clearHover();
  selectedHandle = handle;
  transform.attach(handle);
  currentTool = ToolMode.MOVE_VERTEX;
}
function updateGeometry() {
  const pos = geometry.attributes.position;
  mesh.verts.forEach((v, i) => {
    pos.array[i*3 + 0] = v.position.x;
    pos.array[i*3 + 1] = v.position.y;
    pos.array[i*3 + 2] = v.position.z;
  });
  pos.needsUpdate = true;
  geometry.computeVertexNormals();
}
const gui = new GUI();
gui.add({ tool: currentTool }, "tool", Object.values(ToolMode))
  .onChange(v => {
    currentTool = v;
    if (v === ToolMode.SELECT) transform.detach();
  });
function animate() {
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
