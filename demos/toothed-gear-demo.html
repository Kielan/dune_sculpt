<script type="module">

import * as THREE from 'https://esm.sh/three@0.165.0';
import { OrbitControls } from 'https://esm.sh/three@0.165.0/examples/jsm/controls/OrbitControls.js';

//////////////////////////////////////////////////////////////
// BASIC SCENE
//////////////////////////////////////////////////////////////

const viewport = document.getElementById("viewport");

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xe5e5e5);

const camera = new THREE.PerspectiveCamera(
    45,
    viewport.clientWidth / viewport.clientHeight,
    0.1,
    1000
);

camera.position.set(5,5,5);

const renderer = new THREE.WebGLRenderer({
    antialias:true
});

renderer.setSize(
    viewport.clientWidth,
    viewport.clientHeight
);

renderer.setPixelRatio(devicePixelRatio);

viewport.appendChild(renderer.domElement);

//////////////////////////////////////////////////////////////
// CONTROLS
//////////////////////////////////////////////////////////////

const controls = new OrbitControls(
    camera,
    renderer.domElement
);

controls.enableDamping = true;

//////////////////////////////////////////////////////////////
// GRID + AXES
//////////////////////////////////////////////////////////////

const grid = new THREE.GridHelper(20,20);
scene.add(grid);

const axes = new THREE.AxesHelper(3);
scene.add(axes);

//////////////////////////////////////////////////////////////
// LIGHTS
//////////////////////////////////////////////////////////////

const hemi = new THREE.HemisphereLight(
    0xffffff,
    0x444444,
    1.5
);

scene.add(hemi);

const dir = new THREE.DirectionalLight(
    0xffffff,
    2
);

dir.position.set(5,10,8);
scene.add(dir);

//////////////////////////////////////////////////////////////
// GEAR PARAMETERS
//////////////////////////////////////////////////////////////

const params = {

    teeth:14,
    innerRadius:0.6,
    outerRadius:1.6,
    thickness:0.6,
    toothDepth:0.22

};

//////////////////////////////////////////////////////////////
// GEAR GENERATION
//////////////////////////////////////////////////////////////

let gearMesh;

function buildGear(){

    if(gearMesh){
        scene.remove(gearMesh);
        gearMesh.geometry.dispose();
    }

    const shape = new THREE.Shape();

    const teeth = params.teeth;

    const step = Math.PI * 2 / teeth;

    for(let i=0;i<teeth;i++){

        const a = i * step;

        const r1 = params.outerRadius;
        const r2 = params.outerRadius + params.toothDepth;

        const p1x = Math.cos(a) * r1;
        const p1y = Math.sin(a) * r1;

        const p2x = Math.cos(a + step*0.25) * r2;
        const p2y = Math.sin(a + step*0.25) * r2;

        const p3x = Math.cos(a + step*0.5) * r2;
        const p3y = Math.sin(a + step*0.5) * r2;

        const p4x = Math.cos(a + step*0.75) * r1;
        const p4y = Math.sin(a + step*0.75) * r1;

        if(i===0){
            shape.moveTo(p1x,p1y);
        }

        shape.lineTo(p2x,p2y);
        shape.lineTo(p3x,p3y);
        shape.lineTo(p4x,p4y);
    }

    // HOLE
    const hole = new THREE.Path();

    hole.absellipse(
        0,
        0,
        params.innerRadius,
        params.innerRadius,
        0,
        Math.PI*2
    );

    shape.holes.push(hole);

    const geo = new THREE.ExtrudeGeometry(
        shape,
        {
            depth:params.thickness,
            bevelEnabled:false
        }
    );

    geo.center();

    const mat = new THREE.MeshStandardMaterial({
        color:0x666666,
        metalness:0.4,
        roughness:0.5
    });

    gearMesh = new THREE.Mesh(geo,mat);

    scene.add(gearMesh);
}

buildGear();

//////////////////////////////////////////////////////////////
// PART LIBRARY / HARNESS SYSTEM

const partLibrary = {

    gear:{
        type:"mechanical",
        name:"Spur Gear",
        outputs:["rotation"]
    },

    battery:{
        type:"electrical",
        name:"12V Battery",
        outputs:["positive","negative"]
    },

    ignition:{
        type:"electrical",
        name:"Ignition Switch",
        outputs:["batteryOut","fuseOut"]
    },

    fuse:{
        type:"electrical",
        name:"Fuse",
        outputs:["relayOut"]
    },

    relay:{
        type:"electrical",
        name:"Starter Relay",
        outputs:[
            "batteryPositive",

        ]
    },

    starter:{
        type:"electrical",
        name:"Starter Motor",
        outputs:["torque"]
    }

};

//////////////////////////////////////////////////////////////
// SCENE PARTS
//////////////////////////////////////////////////////////////

const sceneParts = [];

//////////////////////////////////////////////////////////////
// MATERIALS
//////////////////////////////////////////////////////////////

const redMat = new THREE.MeshStandardMaterial({
    color:0xff3333,
    emissive:0x330000
});

const blueMat = new THREE.MeshStandardMaterial({
    color:0x3366ff,
    emissive:0x000022
});

const yellowMat = new THREE.MeshStandardMaterial({
    color:0xffcc22
});

const grayMat = new THREE.MeshStandardMaterial({
    color:0x666666
});

const darkMat = new THREE.MeshStandardMaterial({
    color:0x333333
});

//////////////////////////////////////////////////////////////
// BATTERY
//////////////////////////////////////////////////////////////

function createBattery(){

    const group = new THREE.Group();

    const body = new THREE.Mesh(
        new THREE.BoxGeometry(1.2,0.8,0.8),
        darkMat
    );

    group.add(body);

    const pos = new THREE.Mesh(
        new THREE.CylinderGeometry(0.08,0.08,0.1,16),
        redMat
    );

    pos.rotation.x = Math.PI/2;
    pos.position.set(-0.3,0.45,0);

    group.add(pos);

    const neg = new THREE.Mesh(
        new THREE.CylinderGeometry(0.08,0.08,0.1,16),
        blueMat
    );

    neg.rotation.x = Math.PI/2;
    neg.position.set(0.3,0.45,0);

    group.add(neg);

    group.position.set(-4,0,0);

    scene.add(group);

    sceneParts.push({
        id:"battery",
        mesh:group
    });

    return group;
}

//////////////////////////////////////////////////////////////
// IGNITION SWITCH
//////////////////////////////////////////////////////////////

function createIgnition(){

    const group = new THREE.Group();

    const body = new THREE.Mesh(
        new THREE.CylinderGeometry(0.35,0.35,0.3,32),
        grayMat
    );

    body.rotation.z = Math.PI/2;

    group.add(body);

    const keyhole = new THREE.Mesh(
        new THREE.BoxGeometry(0.05,0.16,0.05),
        darkMat
    );

    group.add(keyhole);

    group.position.set(-1.8,0,0);

    scene.add(group);

    sceneParts.push({
        id:"ignition",
        mesh:group
    });

    return group;
}

//////////////////////////////////////////////////////////////
// FUSE
//////////////////////////////////////////////////////////////

function createFuse(){

    const group = new THREE.Group();

    const glass = new THREE.Mesh(
        new THREE.CylinderGeometry(0.12,0.12,0.7,24),
        new THREE.MeshStandardMaterial({
            color:0x99ddff,
            transparent:true,
            opacity:0.7
        })
    );

    glass.rotation.z = Math.PI/2;

    group.add(glass);

    group.position.set(0,0,0);

    scene.add(group);

    sceneParts.push({
        id:"fuse",
        mesh:group
    });

    return group;
}

//////////////////////////////////////////////////////////////
// RELAY
//////////////////////////////////////////////////////////////

function createRelay(){

    const group = new THREE.Group();

    const box = new THREE.Mesh(
        new THREE.BoxGeometry(1,1,1),
        grayMat
    );

    group.add(box);

    // 4 SOCKETS

    for(let i=0;i<4;i++){

        const socket = new THREE.Mesh(
            new THREE.CylinderGeometry(0.06,0.06,0.2,12),
            yellowMat
        );

        socket.rotation.z = Math.PI/2;

        socket.position.y = 0.35 - i*0.23;
        socket.position.x = -0.55;

        group.add(socket);
    }

    group.position.set(2,0,0);

    scene.add(group);

    sceneParts.push({
        id:"relay",
        mesh:group
    });

    return group;
}

//////////////////////////////////////////////////////////////
// STARTER MOTOR
//////////////////////////////////////////////////////////////

function createStarterMotor(){

    const group = new THREE.Group();

    const body = new THREE.Mesh(
        new THREE.CylinderGeometry(0.4,0.4,1.2,32),
        darkMat
    );

    body.rotation.z = Math.PI/2;

    group.add(body);

    const nose = new THREE.Mesh(
        new THREE.CylinderGeometry(0.2,0.2,0.4,16),
        grayMat
    );

    nose.rotation.z = Math.PI/2;
    nose.position.x = 0.7;

    group.add(nose);

    group.position.set(4.8,0,0);

    scene.add(group);

    sceneParts.push({
        id:"starter",
        mesh:group
    });

    return group;
}

//////////////////////////////////////////////////////////////
// CREATE PARTS
//////////////////////////////////////////////////////////////

const batteryPart = createBattery();
const ignitionPart = createIgnition();
const fusePart = createFuse();
const relayPart = createRelay();
const starterPart = createStarterMotor();

//////////////////////////////////////////////////////////////
// WIRE HARNESS
//////////////////////////////////////////////////////////////

function createWire(start,end,color=0xff0000){

    const points = [];

    points.push(start);

    const mid = new THREE.Vector3(
        (start.x + end.x)/2,
        start.y + 0.7,
        (start.z + end.z)/2
    );

    points.push(mid);

    points.push(end);

    const curve = new THREE.CatmullRomCurve3(points);

    const geo = new THREE.TubeGeometry(
        curve,
        32,
        0.04,
        12,
        false
    );

    const mat = new THREE.MeshStandardMaterial({
        color
    });

    const tube = new THREE.Mesh(geo,mat);

    scene.add(tube);

    return tube;
}

//////////////////////////////////////////////////////////////
// HARNESS CONNECTIONS
//////////////////////////////////////////////////////////////

// Battery positive -> ignition

createWire(
    new THREE.Vector3(-3.5,0.4,0),
    new THREE.Vector3(-2.1,0.2,0),
    0xff0000
);

// Ignition -> fuse

createWire(
    new THREE.Vector3(-1.5,0,0),
    new THREE.Vector3(-0.3,0,0),
    0xff8800
);

// Fuse -> relay

createWire(
    new THREE.Vector3(0.3,0,0),
    new THREE.Vector3(1.5,0.3,0),
    0xffff00
);

// Battery positive -> relay

createWire(
    new THREE.Vector3(-3.5,0.4,0),
    new THREE.Vector3(1.5,0.1,0),
    0xff3333
);

// Battery negative -> relay

createWire(
    new THREE.Vector3(-3.5,-0.4,0),
    new THREE.Vector3(1.5,-0.1,0),
    0x3366ff
);

// Relay -> starter motor

createWire(
    new THREE.Vector3(2.5,-0.3,0),
    new THREE.Vector3(4.2,0,0),
    0x00ff88
);

tree.innerHTML += `

`;

//////////////////////////////////////////////////////////////
// ELECTRICAL ANIMATION
//////////////////////////////////////////////////////////////

let pulseTime = 0;

function animateElectrical(){

    pulseTime += 0.04;

    const glow = (
        Math.sin(pulseTime)*0.5 + 0.5
    );

    redMat.emissiveIntensity = glow * 2.0;
    blueMat.emissiveIntensity = glow * 0.6;
    yellowMat.emissiveIntensity = glow * 1.4;
}

//////////////////////////////////////////////////////////////
// TOOLBAR
//////////////////////////////////////////////////////////////

let currentTool = "select";

document.querySelectorAll(".tool").forEach(tool=>{

    tool.addEventListener("click", ()=>{

        document
            .querySelectorAll(".tool")
            .forEach(t=>t.classList.remove("active"));

        tool.classList.add("active");

        currentTool = tool.dataset.tool;

        setStatus(
            "Tool: " + currentTool
        );
    });

});

//////////////////////////////////////////////////////////////
// STATUS
//////////////////////////////////////////////////////////////

function setStatus(text){
    document.getElementById("status").innerText = text;
}

//////////////////////////////////////////////////////////////
// PROPERTY BINDINGS
//////////////////////////////////////////////////////////////

function bindSlider(id,key){

    document
        .getElementById(id)
        .addEventListener("input",(e)=>{

            params[key] = parseFloat(e.target.value);

            buildGear();

        });
}

bindSlider("teethRange","teeth");
bindSlider("innerRadius","innerRadius");
bindSlider("outerRadius","outerRadius");
bindSlider("thickness","thickness");
bindSlider("toothDepth","toothDepth");

//////////////////////////////////////////////////////////////
// NODE EDITOR BINDINGS
//////////////////////////////////////////////////////////////

document
.getElementById("nodeTeeth")
.addEventListener("input",e=>{

    params.teeth = parseInt(e.target.value);

    document.getElementById("teethRange").value =
        params.teeth;

    buildGear();
});

document
.getElementById("nodeRadius")
.addEventListener("input",e=>{

    params.outerRadius = parseFloat(e.target.value);

    document.getElementById("outerRadius").value =
        params.outerRadius;

    buildGear();
});

document
.getElementById("nodeThickness")
.addEventListener("input",e=>{

    params.thickness = parseFloat(e.target.value);

    document.getElementById("thickness").value =
        params.thickness;

    buildGear();
});

//////////////////////////////////////////////////////////////
// CREATE TOOL INTERACTION
//////////////////////////////////////////////////////////////

const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

renderer.domElement.addEventListener(
    "pointerdown",
    e=>{

        mouse.x =
            (e.clientX / viewport.clientWidth)*2 -1;

        mouse.y =
            -(e.clientY / viewport.clientHeight)*2 +1;

        raycaster.setFromCamera(mouse,camera);

        if(currentTool==="circle"){

            setStatus(
                "Circle sketch started..."
            );

        }

        if(currentTool==="line"){

            setStatus(
                "Line sketch started..."
            );

        }

        if(currentTool==="lasso"){

            setStatus(
                "Lasso selection..."
            );

        }

    }
);

//////////////////////////////////////////////////////////////
// CAMERA PLANE SHORTCUTS
//////////////////////////////////////////////////////////////

document
.getElementById("frontPlane")
.addEventListener("click",()=>{

    camera.position.set(0,0,6);
    controls.target.set(0,0,0);

});

document
.getElementById("topPlane")
.addEventListener("click",()=>{

    camera.position.set(0,6,0.001);
    controls.target.set(0,0,0);

});

document
.getElementById("rightPlane")
.addEventListener("click",()=>{

    camera.position.set(6,0,0);
    controls.target.set(0,0,0);

});

//////////////////////////////////////////////////////////////
// ANIMATION
//////////////////////////////////////////////////////////////

function animate(){

    requestAnimationFrame(animate);

    controls.update();

    gearMesh.rotation.z += 0.002;

    renderer.render(scene,camera);
}

animate();

//////////////////////////////////////////////////////////////
// RESIZE
//////////////////////////////////////////////////////////////

window.addEventListener("resize",()=>{

    camera.aspect =
        viewport.clientWidth /
        viewport.clientHeight;

    camera.updateProjectionMatrix();

    renderer.setSize(
        viewport.clientWidth,
        viewport.clientHeight
    );

});

</script>
