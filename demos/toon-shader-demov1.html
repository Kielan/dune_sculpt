<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Toon Shader Node Graph Demo</title>

<style>

html,body{
    margin:0;
    overflow:hidden;
    background:#111;
    color:white;
    font-family:Arial;
}

#root{
    display:flex;
    width:100vw;
    height:100vh;
}

#viewport{
    flex:1;
}

#nodes{
    width:420px;
    background:#1a1a1a;
    position:relative;
    border-left:1px solid #333;
}

svg{
    position:absolute;
    inset:0;
    pointer-events:none;
}

.node{
    position:absolute;
    width:180px;
    background:#282828;
    border:1px solid #444;
    border-radius:8px;
}

.header{
    padding:8px;
    background:#3a3a3a;
    cursor:move;
    font-weight:bold;
    border-radius:8px 8px 0 0;
}

.body{
    padding:8px;
    font-size:12px;
    color:#bbb;
}

.socket{
    width:10px;
    height:10px;
    border-radius:50%;
    display:inline-block;
    margin-right:6px;
}

.in{background:#44aaff;}
.out{background:#ffaa44;}

#controls{
    position:absolute;
    top:10px;
    left:10px;
    z-index:10;
    background:rgba(0,0,0,.7);
    padding:10px;
    border-radius:8px;
}

label{
    display:block;
    margin-top:8px;
}

</style>
</head>

<body>

<div id="root">

<div id="viewport">

<div id="controls">

<label>
Gradient Strength
<input id="strength"
type="range"
min="0"
max="1"
step="0.01"
value="0.75">
</label>

<label>
Band Count
<input id="bands"
type="range"
min="2"
max="8"
step="1"
value="4">
</label>

</div>

</div>

<div id="nodes">

<svg id="wires"></svg>

<div class="node" id="n1" style="left:20px;top:30px;">
<div class="header">Diffuse BSDF</div>
<div class="body">
<span class="socket out"></span>BSDF
</div>
</div>

<div class="node" id="n2" style="left:220px;top:30px;">
<div class="header">Shader To RGB</div>
<div class="body">
<span class="socket in"></span>Shader<br>
<span class="socket out"></span>Color
</div>
</div>

<div class="node" id="n3" style="left:120px;top:180px;">
<div class="header">Color Ramp</div>
<div class="body">
<span class="socket in"></span>Fac<br>
<span class="socket out"></span>Color
</div>
</div>

<div class="node" id="n4" style="left:20px;top:420px;">
<div class="header">Texture Coordinate</div>
<div class="body">
<span class="socket out"></span>Window
</div>
</div>

<div class="node" id="n5" style="left:220px;top:420px;">
<div class="header">Separate XYZ</div>
<div class="body">
<span class="socket in"></span>Vector<br>
<span class="socket out"></span>Y
</div>
</div>

<div class="node" id="n6" style="left:120px;top:580px;">
<div class="header">Color Ramp</div>
<div class="body">
<span class="socket in"></span>Fac<br>
<span class="socket out"></span>Gradient
</div>
</div>

<div class="node" id="n7" style="left:120px;top:760px;">
<div class="header">Overlay Mix</div>
<div class="body">
<span class="socket in"></span>Toon<br>
<span class="socket in"></span>Gradient<br>
<span class="socket out"></span>Color
</div>
</div>

<div class="node" id="n8" style="left:120px;top:940px;">
<div class="header">Material Output</div>
<div class="body">
<span class="socket in"></span>Surface
</div>
</div>

</div>

</div>

<script type="module">

import * as THREE from
"https://esm.sh/three@0.161.0";

import {OrbitControls}
from "https://esm.sh/three@0.161.0/examples/jsm/controls/OrbitControls.js";

//////////////////////////////////////////////////
// Scene
//////////////////////////////////////////////////

const scene=new THREE.Scene();
scene.background=new THREE.Color(0x151515);

const camera=new THREE.PerspectiveCamera(
60,
(window.innerWidth-420)/window.innerHeight,
0.1,
100
);

camera.position.set(0,1.5,4);

const renderer=new THREE.WebGLRenderer({
antialias:true
});

renderer.setSize(
window.innerWidth-420,
window.innerHeight
);

document
.getElementById("viewport")
.appendChild(renderer.domElement);

const controls=
new OrbitControls(
camera,
renderer.domElement
);

//////////////////////////////////////////////////
// Lights
//////////////////////////////////////////////////

scene.add(
new THREE.HemisphereLight(
0xffffff,
0x333333,
1.5
)
);

const sun=
new THREE.DirectionalLight(
0xffffff,
3
);

sun.position.set(
5,
10,
5
);

scene.add(sun);

//////////////////////////////////////////////////
// Toon Shader
//////////////////////////////////////////////////

const uniforms={

gradientStrength:{value:.75},
bandCount:{value:4}

};

const material=
new THREE.ShaderMaterial({

uniforms,

vertexShader:`

varying vec3 vNormal;
varying vec3 vWorldPos;

void main(){

vNormal=
normalize(
mat3(modelMatrix)*normal
);

vec4 world=
modelMatrix*vec4(position,1.0);

vWorldPos=world.xyz;

gl_Position=
projectionMatrix*
viewMatrix*
world;

}

`,

fragmentShader:`

uniform float gradientStrength;
uniform float bandCount;

varying vec3 vNormal;
varying vec3 vWorldPos;

void main(){

////////////////////////////////////////
// Diffuse BSDF
////////////////////////////////////////

vec3 lightDir=
normalize(vec3(1.0,1.0,1.0));

float NdotL=
max(dot(
normalize(vNormal),
lightDir
),0.0);

////////////////////////////////////////
// ShaderToRGB
////////////////////////////////////////

float lightValue=NdotL;

////////////////////////////////////////
// Toon ColorRamp
////////////////////////////////////////

float bands=
floor(
lightValue*bandCount
)/bandCount;

vec3 shadow=
vec3(0.22,0.45,0.55);

vec3 lit=
vec3(0.72,0.95,1.0);

vec3 toonColor=
mix(
shadow,
lit,
bands
);

////////////////////////////////////////
// Screen Gradient
////////////////////////////////////////

float gradient=
gl_FragCoord.y/900.0;

vec3 mood=
mix(
vec3(0.1,0.2,0.3),
vec3(0.9,0.95,1.0),
gradient
);

////////////////////////////////////////
// Overlay Blend
////////////////////////////////////////

vec3 overlay=
mix(
toonColor,
toonColor*mood*2.0,
gradientStrength
);

gl_FragColor=
vec4(overlay,1.0);

}

`

});

//////////////////////////////////////////////////
// Mesh
//////////////////////////////////////////////////

const geometry=
new THREE.SphereGeometry(
1,
128,
128
);

const mesh=
new THREE.Mesh(
geometry,
material
);

scene.add(mesh);

//////////////////////////////////////////////////
// Floor
//////////////////////////////////////////////////

const floor=
new THREE.Mesh(
new THREE.PlaneGeometry(20,20),
new THREE.MeshStandardMaterial({
color:0x202020
})
);

floor.rotation.x=
-Math.PI/2;

floor.position.y=-1.5;

scene.add(floor);

//////////////////////////////////////////////////
// UI
//////////////////////////////////////////////////

strength.oninput=()=>{
uniforms.gradientStrength.value=
parseFloat(strength.value);
};

bands.oninput=()=>{
uniforms.bandCount.value=
parseFloat(bands.value);
};

//////////////////////////////////////////////////
// Node Wires
//////////////////////////////////////////////////

const svg=document.getElementById("wires");

function connect(a,b){

const p=document.createElementNS(
"http://www.w3.org/2000/svg",
"path"
);

const ax=a.offsetLeft+180;
const ay=a.offsetTop+40;

const bx=b.offsetLeft;
const by=b.offsetTop+40;

p.setAttribute(
"d",
`M${ax} ${ay}
C${ax+80} ${ay}
${bx-80} ${by}
${bx} ${by}`
);

p.setAttribute("stroke","#888");
p.setAttribute("stroke-width","3");
p.setAttribute("fill","none");

svg.appendChild(p);

}

function rebuild(){

svg.innerHTML="";

connect(n1,n2);
connect(n2,n3);

connect(n4,n5);
connect(n5,n6);

connect(n3,n7);
connect(n6,n7);

connect(n7,n8);

}

rebuild();

//////////////////////////////////////////////////
// Draggable Nodes
//////////////////////////////////////////////////

document.querySelectorAll(".node")
.forEach(node=>{

let drag=false;
let ox=0;
let oy=0;

const head=
node.querySelector(".header");

head.onmousedown=e=>{

drag=true;

ox=e.clientX-node.offsetLeft;
oy=e.clientY-node.offsetTop;

};

window.addEventListener(
"mousemove",
e=>{

if(!drag) return;

node.style.left=
e.clientX-ox+"px";

node.style.top=
e.clientY-oy+"px";

rebuild();

});

window.addEventListener(
"mouseup",
()=>drag=false
);

});

//////////////////////////////////////////////////
// Animate
//////////////////////////////////////////////////

function animate(){

requestAnimationFrame(
animate
);

mesh.rotation.y+=0.004;

controls.update();

renderer.render(
scene,
camera
);

}

animate();

//////////////////////////////////////////////////
// Resize
//////////////////////////////////////////////////

window.addEventListener(
"resize",
()=>{

const w=
window.innerWidth-420;

const h=
window.innerHeight;

camera.aspect=w/h;
camera.updateProjectionMatrix();

renderer.setSize(w,h);

}
);

</script>
</body>
</html>
