<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">

<title>Procedural Tree Generator Step 1</title>

<style>

html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Arial;
}

#sidebar{

    position:absolute;

    left:0;
    top:0;

    width:300px;
    height:100%;

    background:#252525;
    color:white;

    overflow:auto;

    border-right:1px solid #444;
}

#viewport{

    position:absolute;

    left:300px;
    top:0;
    right:0;
    bottom:0;
}

.section{

    padding:10px;

    border-bottom:1px solid #444;
}

button{

    width:100%;
    padding:10px;

    background:#444;
    color:white;

    border:none;
}

.node{

    margin:8px;

    background:#333;

    border:1px solid #555;

    border-radius:6px;
}

.nodeTitle{

    background:#444;

    padding:8px;

    font-weight:bold;
}

.nodeBody{

    padding:8px;
}

</style>

</head>

<body>

<div id="sidebar">

<div class="section">
<h2>Tree Generator</h2>
</div>

<div class="section">

<button id="regenBtn">
Regenerate Trunk
</button>

</div>

<div class="section">

<h3>Node Graph</h3>

<div class="node">

<div class="nodeTitle">
Bounds
</div>

<div class="nodeBody">
Generation Volume
</div>

</div>

<div class="node">

<div class="nodeTitle">
Trunk
</div>

<div class="nodeBody">
Cylinder Generator
</div>

</div>

<div class="node">

<div class="nodeTitle">
Mesh Output
</div>

<div class="nodeBody">
Scene Geometry
</div>

</div>

</div>

</div>

<div id="viewport"></div>

<script type="module">

import * as THREE from "https://unpkg.com/three@0.161.0/build/three.module.js";

import { OrbitControls }
from "https://unpkg.com/three@0.161.0/examples/jsm/controls/OrbitControls.js";

//////////////////////////////////////////////////////////
// Scene
//////////////////////////////////////////////////////////

const viewport =
document.getElementById(
"viewport"
);

const scene =
new THREE.Scene();

scene.background =
new THREE.Color(
0x6c6c6c
);

const camera =
new THREE.PerspectiveCamera(

60,

viewport.clientWidth /
viewport.clientHeight,

0.1,
1000

);

camera.position.set(
8,
6,
8
);

const renderer =
new THREE.WebGLRenderer({

antialias:true

});

renderer.setSize(
viewport.clientWidth,
viewport.clientHeight
);

viewport.appendChild(
renderer.domElement
);

//////////////////////////////////////////////////////////
// Orbit Controls
//////////////////////////////////////////////////////////

const controls =
new OrbitControls(
camera,
renderer.domElement
);

controls.target.set(
0,
2,
0
);

controls.update();

//////////////////////////////////////////////////////////
// Lights
//////////////////////////////////////////////////////////

scene.add(

new THREE.HemisphereLight(
0xffffff,
0x444444,
2
)

);

const sun =
new THREE.DirectionalLight(
0xffffff,
2
);

sun.position.set(
10,
20,
10
);

scene.add(
sun
);

//////////////////////////////////////////////////////////
// Grid
//////////////////////////////////////////////////////////

scene.add(

new THREE.GridHelper(
20,
20
)

);

//////////////////////////////////////////////////////////
// Yellow Bounds Cage
//////////////////////////////////////////////////////////

function createBounds(size){

const group =
new THREE.Group();

const material =
new THREE.LineBasicMaterial({

color:0xffff00

});

const pts = [

[-size,-size,-size],
[ size,-size,-size],

[ size,-size,-size],
[ size, size,-size],

[ size, size,-size],
[-size, size,-size],

[-size, size,-size],
[-size,-size,-size],

[-size,-size, size],
[ size,-size, size],

[ size,-size, size],
[ size, size, size],

[ size, size, size],
[-size, size, size],

[-size, size, size],
[-size,-size, size],

[-size,-size,-size],
[-size,-size, size],

[ size,-size,-size],
[ size,-size, size],

[ size, size,-size],
[ size, size, size],

[-size, size,-size],
[-size, size, size]

];

const positions=[];

pts.forEach(p=>{

positions.push(
p[0],
p[1],
p[2]
);

});

const geo =
new THREE.BufferGeometry();

geo.setAttribute(

"position",

new THREE.Float32BufferAttribute(
positions,
3
)

);

group.add(

new THREE.LineSegments(
geo,
material
)

);

return group;

}

scene.add(
createBounds(4)
);

//////////////////////////////////////////////////////////
// Procedural Trunk
//////////////////////////////////////////////////////////

let trunkMesh = null;

function buildTree(){

if(trunkMesh){

scene.remove(
trunkMesh
);

trunkMesh.geometry.dispose();

}

const height =
3 +
Math.random()*4;

const radius =
0.25 +
Math.random()*0.15;

const geo =
new THREE.CylinderGeometry(

radius*0.8,
radius,
height,
8

);

const mat =
new THREE.MeshStandardMaterial({

color:0x7a4d22

});

trunkMesh =
new THREE.Mesh(
geo,
mat
);

trunkMesh.position.y =
height*0.5;

scene.add(
trunkMesh
);

}

buildTree();

//////////////////////////////////////////////////////////
// UI
//////////////////////////////////////////////////////////

document
.getElementById(
"regenBtn"
)
.onclick=
buildTree;

//////////////////////////////////////////////////////////
// Resize
//////////////////////////////////////////////////////////

window.addEventListener(
"resize",
()=>{

camera.aspect =
viewport.clientWidth /
viewport.clientHeight;

camera.updateProjectionMatrix();

renderer.setSize(

viewport.clientWidth,
viewport.clientHeight

);

}
);

//////////////////////////////////////////////////////////
// Render
//////////////////////////////////////////////////////////

function animate(){

requestAnimationFrame(
animate
);

renderer.render(
scene,
camera
);

}

animate();

</script>

</body>
</html>
